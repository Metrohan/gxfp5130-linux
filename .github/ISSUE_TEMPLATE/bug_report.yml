name: Bug report
description: Something is broken or not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out every section.

  - type: input
    id: laptop
    attributes:
      label: Laptop model
      placeholder: "e.g. Huawei MateBook D16 2024 MCLF-XX"
    validations:
      required: true

  - type: input
    id: kernel
    attributes:
      label: Kernel version
      description: "`uname -r`"
      placeholder: "e.g. 7.1.3-arch1-3"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distribution
      placeholder: "e.g. Arch Linux, Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: step
    attributes:
      label: Which step fails?
      options:
        - Build (`build.sh`)
        - Install / modprobe
        - PSK provisioning
        - Raw capture (`gxfp_capture`)
        - fprintd enrollment
        - fprintd verify
        - PAM / sudo / login screen
        - Other
    validations:
      required: true

  - type: textarea
    id: dmesg
    attributes:
      label: Kernel log
      description: "`journalctl -k -b -g gxfp`"
      render: text
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what you did and what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
